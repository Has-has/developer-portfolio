<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicon -->

    <link
    rel="icon"
    type="image/x-icon"
    href="/images/logos/favicon.ico"
    />
      
    <link
      rel="icon"
      type="image/svg+xml"
      href="/images/logos/favicon.svg"
    />
      
    <link
      rel="icon"
      type="image/png"
      sizes="96x96"
      href="/images/logos/favicon-96x96.png"
    />
      
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/images/logos/apple-touch-icon.png"
    />
      
    <link
      rel="manifest"
      href="/site.webmanifest"
    />

    <!-- Viewport -->

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1"
    />

    <!-- Primary SEO -->

    <title>Hasan Abulaban | Full Stack Developer</title>

    <meta
      name="title"
      content="Hasan Abulaban | Full Stack Developer"
    />

    <meta
      name="description"
      content="Software Engineering graduate and Full Stack Developer building modern, responsive, and scalable web applications with React, Node.js, Express, PostgreSQL, and Oracle."
    />

    <meta
      name="keywords"
      content="Hasan Abulaban, Full Stack Developer, Software Engineer, React, Node.js, Express, PostgreSQL, Oracle, JavaScript, Portfolio"
    />

    <meta
      name="author"
      content="Hasan Abulaban"
    />

    <meta
      name="robots"
      content="index, follow"
    />

    <meta
      name="theme-color"
      content="#09090B"
    />

    <meta
      name="color-scheme"
      content="dark"
    />

    <!-- Replace with your real domain after deployment -->

    <link
      rel="canonical"
      href="https://YOUR-DOMAIN.com/"
    />

    <!-- Open Graph -->

    <meta
      property="og:type"
      content="website"
    />

    <meta
      property="og:site_name"
      content="Hasan Abulaban Portfolio"
    />

    <meta
      property="og:title"
      content="Hasan Abulaban | Full Stack Developer"
    />

    <meta
      property="og:description"
      content="Turning ideas into modern, scalable web applications."
    />

    <meta
      property="og:image"
      content="https://YOUR-DOMAIN.com/images/branding/og-image.png"
    />

    <meta
      property="og:url"
      content="https://YOUR-DOMAIN.com/"
    />

    <meta
      property="og:locale"
      content="en_CA"
    />

    <!-- Twitter -->

    <meta
      name="twitter:card"
      content="summary_large_image"
    />

    <meta
      name="twitter:title"
      content="Hasan Abulaban | Full Stack Developer"
    />

    <meta
      name="twitter:description"
      content="Turning ideas into modern, scalable web applications."
    />

    <meta
      name="twitter:image"
      content="https://YOUR-DOMAIN.com/images/branding/og-image.png"
    />
  </head>

  <body>
    <div id="root"></div>

    <script
      type="module"
      src="/src/main.jsx"
    ></script>
  </body>
</html>
